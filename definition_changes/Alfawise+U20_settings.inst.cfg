[general]
version = 4
name = Alfawise U20_settings
definition = alfawise_u20

[metadata]
type = definition_changes
setting_version = 26

[values]
extruders_enabled_count = 1
machine_start_gcode = ; -- START GCODE --
	G21                      ;set units to millimetres
	G90                      ;set to absolute positioning
	M106 S0                  ;set fan speed to zero (turned off)
	G28                      ;home all axis
	G29                      ;BLTouch auto bed leveling (mesh grid configured in firmware)
	M420 S1                  ;enable bed leveling compensation
	G92 E0                  ;zero the extruded length
	G1 Z1 F1000             ;move up slightly
	G1 Y60.0 Z0 E9.0 F1000.0;intro line
	G1 Y100.0 E21.5 F1000.0 ;continue line
	G92 E0                  ;zero the extruded length again
	; -- end of START GCODE --

